    <rect x="440" y="196" width="8" height="8" rx="2" fill="#888888"/>
    <text x="455" y="205" font-family="monospace" font-size="12" fill="#cccccc">N/A</text>
    <text x="560" y="205" font-family="monospace" font-size="12" fill="#555555">0%</text>
