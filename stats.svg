<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <rect width="680" height="400" rx="12" fill="#0d0d0d"/>

  <!-- ── LEFT PANEL ── -->

  <!-- GITHUB STATS title -->
  <text x="40" y="44" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2">
    GITHUB STATS
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- commits -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="40" y="82" font-family="monospace" font-size="11" fill="#555555">total commits</text>
    <text x="40" y="110" font-family="monospace" font-size="26" font-weight="700" fill="#ffffff">99</text>
  </g>

  <!-- repos -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <text x="40" y="146" font-family="monospace" font-size="11" fill="#555555">repositories</text>
    <text x="40" y="174" font-family="monospace" font-size="26" font-weight="700" fill="#ffffff">12</text>
  </g>

  <!-- pull requests -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
    <text x="40" y="210" font-family="monospace" font-size="11" fill="#555555">pull requests</text>
    <text x="40" y="238" font-family="monospace" font-size="26" font-weight="700" fill="#ffffff">0</text>
  </g>

  <!-- streak -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>
    <line x1="40" y1="258" x2="175" y2="258" stroke="#1e1e1e" stroke-width="1"/>
    <text x="40" y="278" font-family="monospace" font-size="11" fill="#555555">current streak</text>
    <text x="40" y="298" font-family="monospace" font-size="13" fill="#aaaaaa">1 day  ·  longest 4 days</text>
  </g>

  <!-- vertical divider -->
  <line x1="205" y1="28" x2="205" y2="318" stroke="#1e1e1e" stroke-width="1">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.2s" fill="freeze"/>
  </line>

  <!-- ── RIGHT PANEL ── -->

  <!-- TOP LANGUAGES title -->
  <text x="230" y="44" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2">
    TOP LANGUAGES
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Ring chart tracks -->
  <circle cx="360" cy="175" r="68" fill="none" stroke="#1a1a1a" stroke-width="13"/>
  <circle cx="360" cy="175" r="50" fill="none" stroke="#1a1a1a" stroke-width="11"/>
  <circle cx="360" cy="175" r="33" fill="none" stroke="#1a1a1a" stroke-width="9"/>

  <!-- HTML outer ring: 62% → dashoffset = 427*(1-0.62) = 162 -->
  <circle cx="360" cy="175" r="68" fill="none" stroke="#e34f26" stroke-width="13"
    stroke-linecap="round"
    stroke-dasharray="427" stroke-dashoffset="427"
    transform="rotate(-90 360 175)">
    <animate attributeName="stroke-dashoffset" from="427" to="162" dur="1.4s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.4s" fill="freeze"/>
  </circle>

  <!-- JS mid ring: 24% → dashoffset = 314*(1-0.24) = 239 -->
  <circle cx="360" cy="175" r="50" fill="none" stroke="#f7df1e" stroke-width="11"
    stroke-linecap="round"
    stroke-dasharray="314" stroke-dashoffset="314"
    transform="rotate(-90 360 175)">
    <animate attributeName="stroke-dashoffset" from="314" to="239" dur="1.4s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
  </circle>

  <!-- Python inner ring: 14% → dashoffset = 207*(1-0.14) = 178 -->
  <circle cx="360" cy="175" r="33" fill="none" stroke="#3776ab" stroke-width="9"
    stroke-linecap="round"
    stroke-dasharray="207" stroke-dashoffset="207"
    transform="rotate(-90 360 175)">
    <animate attributeName="stroke-dashoffset" from="207" to="178" dur="1.4s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.0s" fill="freeze"/>
  </circle>

  <!-- Legend -->
  <!-- HTML -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <rect x="460" y="120" width="8" height="8" rx="2" fill="#e34f26"/>
    <text x="476" y="129" font-family="monospace" font-size="12" fill="#cccccc">HTML</text>
    <text x="560" y="129" font-family="monospace" font-size="12" fill="#555555">62%</text>
  </g>

  <!-- JavaScript -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>
    <rect x="460" y="148" width="8" height="8" rx="2" fill="#f7df1e"/>
    <text x="476" y="157" font-family="monospace" font-size="12" fill="#cccccc">JavaScript</text>
    <text x="560" y="157" font-family="monospace" font-size="12" fill="#555555">24%</text>
  </g>

  <!-- Python -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <rect x="460" y="176" width="8" height="8" rx="2" fill="#3776ab"/>
    <text x="476" y="185" font-family="monospace" font-size="12" fill="#cccccc">Python</text>
    <text x="560" y="185" font-family="monospace" font-size="12" fill="#555555">14%</text>
  </g>

  <!-- ── BOTTOM BARS ── -->
  <line x1="30" y1="318" x2="650" y2="318" stroke="#1e1e1e" stroke-width="1">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.0s" fill="freeze"/>
  </line>

  <text x="40" y="338" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2">
    LANGUAGE BREAKDOWN
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
  </text>

  <!-- HTML bar -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze"/>
    <text x="40" y="362" font-family="monospace" font-size="11" fill="#cccccc">HTML</text>
    <rect x="110" y="354" width="460" height="5" rx="2" fill="#1a1a1a"/>
    <rect x="110" y="354" width="0" height="5" rx="2" fill="#e34f26">
      <animate attributeName="width" from="0" to="285" dur="1.2s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <text x="582" y="362" font-family="monospace" font-size="11" fill="#555555">62%</text>
  </g>

  <!-- JS bar -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.3s" fill="freeze"/>
    <text x="40" y="380" font-family="monospace" font-size="11" fill="#cccccc">JS</text>
    <rect x="110" y="372" width="460" height="5" rx="2" fill="#1a1a1a"/>
    <rect x="110" y="372" width="0" height="5" rx="2" fill="#f7df1e">
      <animate attributeName="width" from="0" to="110" dur="1.2s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <text x="582" y="380" font-family="monospace" font-size="11" fill="#555555">24%</text>
  </g>

</svg>
