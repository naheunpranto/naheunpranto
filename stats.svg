    <text x="572" y="342" font-family="monospace" font-size="11" fill="#555555">46%</text>
  </g>

  <!-- Bar 2 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze"/>
