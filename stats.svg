    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Ring tracks -->
  <circle cx="340" cy="155" r="62" fill="none" stroke="#1a1a1a" stroke-width="12"/>
  <circle cx="340" cy="155" r="46" fill="none" stroke="#1a1a1a" stroke-width="10"/>
  <circle cx="340" cy="155" r="31" fill="none" stroke="#1a1a1a" stroke-width="8"/>

  <!-- Lang 1 ring -->
  <circle cx="340" cy="155" r="62" fill="none" stroke="#e34f26" stroke-width="12"
