<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">

  <rect width="680" height="420" rx="12" fill="#0d0d0d"/>

  <!-- ── LEFT PANEL ── -->

  <text x="40" y="44" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2" opacity="0">
    GITHUB STATS
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
  </text>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="40" y="82" font-family="monospace" font-size="11" fill="#555555">total commits</text>
    <text x="40" y="110" font-family="monospace" font-size="26" font-weight="700" fill="#ffffff">126</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <text x="40" y="146" font-family="monospace" font-size="11" fill="#555555">repositories</text>
    <text x="40" y="174" font-family="monospace" font-size="26" font-weight="700" fill="#ffffff">31</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
    <text x="40" y="210" font-family="monospace" font-size="11" fill="#555555">pull requests</text>
    <text x="40" y="238" font-family="monospace" font-size="26" font-weight="700" fill="#ffffff">0</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>
    <line x1="40" y1="258" x2="175" y2="258" stroke="#1e1e1e" stroke-width="1"/>
    <text x="40" y="278" font-family="monospace" font-size="11" fill="#555555">current streak</text>
    <text x="40" y="298" font-family="monospace" font-size="13" fill="#aaaaaa">1 day  ·  longest 4 days</text>
  </g>

  <line x1="205" y1="28" x2="205" y2="398" stroke="#1e1e1e" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.2s" fill="freeze"/>
  </line>

  <!-- ── RIGHT PANEL ── -->

  <text x="230" y="44" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2" opacity="0">
