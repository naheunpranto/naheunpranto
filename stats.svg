    <text x="572" y="387" font-family="monospace" font-size="11" fill="#555555">7%</text>
  </g>

  <!-- Bar 5 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
    <text x="40" y="402" font-family="monospace" font-size="11" fill="#cccccc">N/A</text>
    <rect x="130" y="394" width="430" height="5" rx="2" fill="#1a1a1a"/>
    <rect x="130" y="394" width="0" height="5" rx="2" fill="#888888">
      <animate attributeName="width" from="0" to="0" dur="1.2s" begin="1.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
