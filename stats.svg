    <rect x="130" y="364" width="430" height="5" rx="2" fill="#1a1a1a"/>
    <rect x="130" y="364" width="0" height="5" rx="2" fill="#663399">
      <animate attributeName="width" from="0" to="77" dur="1.2s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <text x="572" y="372" font-family="monospace" font-size="11" fill="#555555">18%</text>
  </g>

  <!-- Bar 4 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>
    <text x="40" y="387" font-family="monospace" font-size="11" fill="#cccccc">Python</text>
    <rect x="130" y="379" width="430" height="5" rx="2" fill="#1a1a1a"/>
