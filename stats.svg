    transform="rotate(-90 340 155)" opacity="0">
    <animate attributeName="stroke-dashoffset" from="390" to="211" dur="1.4s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.4s" fill="freeze"/>
  </circle>

  <!-- Lang 2 ring -->
  <circle cx="340" cy="155" r="46" fill="none" stroke="#f7df1e" stroke-width="10"
